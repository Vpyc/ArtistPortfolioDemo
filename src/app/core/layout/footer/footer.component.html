<footer>
  <div class="container">

    <div class="links">
      @for (link of content.links; track link.href) {
        <a
          [href]="link.href"
          target="_blank"
          rel="noopener noreferrer">

          {{ link.label }}

        </a>
      }
    </div>

    <p class="copyright">
      © {{ year }} {{ content.copyright }}
    </p>

  </div>
</footer>
